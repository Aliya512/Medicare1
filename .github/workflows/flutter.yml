name: Flutter CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'

      - run: flutter pub get

      # - run: flutter analyze || true
      
      - run: flutter build apk --debug